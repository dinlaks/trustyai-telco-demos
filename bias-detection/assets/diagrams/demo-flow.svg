<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Red Hat Display, RedHatDisplay, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="320" fill="#f8f8f8" rx="8"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#151515">AI Fairness Lifecycle — Demo Flow</text>
  <text x="480" y="54" text-anchor="middle" font-size="11" fill="#6a6e73">5G Network Slice Allocation Model  |  Region (Urban vs Rural) Protected Attribute</text>

  <!-- ── Stage boxes ─────────────────────────────────────────── -->

  <!-- Stage 1: Train Biased Model (gray) -->
  <rect x="20" y="78" width="158" height="170" rx="10" fill="#ffffff" stroke="#6a6e73" stroke-width="2"/>
  <rect x="20" y="78" width="158" height="34" rx="10" fill="#475569"/>
  <rect x="20" y="100" width="158" height="12" fill="#475569"/>
  <text x="99" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Train</text>
  <text x="99" y="115" text-anchor="middle" font-size="10" fill="#ffffff">Biased Model</text>
  <text x="99" y="138" text-anchor="middle" font-size="10" fill="#333">MLP on 7,000 rows</text>
  <text x="99" y="155" text-anchor="middle" font-size="10" fill="#333">Urban: +0.35 score</text>
  <text x="99" y="172" text-anchor="middle" font-size="10" fill="#333">Rural: −0.25 score</text>
  <!-- metric box -->
  <rect x="34" y="186" width="130" height="48" rx="6" fill="#f1f5f9"/>
  <text x="99" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Baseline</text>
  <text x="99" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">SPD +0.12</text>
  <text x="99" y="232" text-anchor="middle" font-size="10" fill="#475569">DIR 0.61</text>

  <!-- Arrow 1→2 -->
  <polygon points="180,164 196,158 196,170" fill="#555"/>
  <line x1="178" y1="164" x2="195" y2="164" stroke="#555" stroke-width="2"/>

  <!-- Stage 2: Deploy + Monitor (blue) -->
  <rect x="198" y="78" width="158" height="170" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="198" y="78" width="158" height="34" rx="10" fill="#0066cc"/>
  <rect x="198" y="100" width="158" height="12" fill="#0066cc"/>
  <text x="277" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. Deploy</text>
  <text x="277" y="115" text-anchor="middle" font-size="10" fill="#ffffff">TrustyAI Monitoring</text>
  <text x="277" y="138" text-anchor="middle" font-size="10" fill="#333">ISVC + TrustyAI CR</text>
  <text x="277" y="155" text-anchor="middle" font-size="10" fill="#333">Seed 200 inferences</text>
  <text x="277" y="172" text-anchor="middle" font-size="10" fill="#333">via oc exec :9081</text>
  <rect x="212" y="186" width="130" height="48" rx="6" fill="#eff6ff"/>
  <text x="277" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#0066cc">Monitoring Active</text>
  <text x="277" y="218" text-anchor="middle" font-size="10" fill="#0066cc">SPD/DIR registered</text>
  <text x="277" y="232" text-anchor="middle" font-size="10" fill="#0066cc">Grafana live</text>

  <!-- Arrow 2→3 -->
  <polygon points="358,164 374,158 374,170" fill="#555"/>
  <line x1="356" y1="164" x2="373" y2="164" stroke="#555" stroke-width="2"/>

  <!-- Stage 3: Bias Injected (orange/red) -->
  <rect x="376" y="78" width="158" height="170" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2.5"/>
  <rect x="376" y="78" width="158" height="34" rx="10" fill="#ea580c"/>
  <rect x="376" y="100" width="158" height="12" fill="#ea580c"/>
  <text x="455" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Bias Injected</text>
  <text x="455" y="115" text-anchor="middle" font-size="10" fill="#ffffff">Model Drift Simulated</text>
  <text x="455" y="138" text-anchor="middle" font-size="10" fill="#333">Urban charges: $115</text>
  <text x="455" y="155" text-anchor="middle" font-size="10" fill="#333">Rural charges: $22</text>
  <text x="455" y="172" text-anchor="middle" font-size="10" fill="#333">200 skewed inferences</text>
  <rect x="390" y="186" width="130" height="48" rx="6" fill="#fff7ed"/>
  <text x="455" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#ea580c">Bias Detected</text>
  <text x="455" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">SPD +0.60</text>
  <text x="455" y="232" text-anchor="middle" font-size="10" fill="#ea580c">DIR 0.00 ⚠</text>

  <!-- Arrow 3→4 -->
  <polygon points="536,164 552,158 552,170" fill="#555"/>
  <line x1="534" y1="164" x2="551" y2="164" stroke="#555" stroke-width="2"/>

  <!-- Stage 4: Alert + Retrain (red) -->
  <rect x="554" y="78" width="158" height="170" rx="10" fill="#ffffff" stroke="#ee0000" stroke-width="2.5"/>
  <rect x="554" y="78" width="158" height="34" rx="10" fill="#ee0000"/>
  <rect x="554" y="100" width="158" height="12" fill="#ee0000"/>
  <text x="633" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. Alert Fires</text>
  <text x="633" y="115" text-anchor="middle" font-size="10" fill="#ffffff">Auto Remediation</text>
  <text x="633" y="138" text-anchor="middle" font-size="10" fill="#333">PrometheusRule fires</text>
  <text x="633" y="155" text-anchor="middle" font-size="10" fill="#333">KFP pipeline triggered</text>
  <text x="633" y="172" text-anchor="middle" font-size="10" fill="#333">Fair retrain job runs</text>
  <rect x="568" y="186" width="130" height="48" rx="6" fill="#fff0f0"/>
  <text x="633" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#ee0000">Retraining</text>
  <text x="633" y="218" text-anchor="middle" font-size="10" fill="#ee0000">Region excluded from</text>
  <text x="633" y="232" text-anchor="middle" font-size="10" fill="#ee0000">label assignment</text>

  <!-- Arrow 4→5 -->
  <polygon points="714,164 730,158 730,170" fill="#555"/>
  <line x1="712" y1="164" x2="729" y2="164" stroke="#555" stroke-width="2"/>

  <!-- Stage 5: Verified Fair (green) -->
  <rect x="732" y="78" width="208" height="170" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="732" y="78" width="208" height="34" rx="10" fill="#16a34a"/>
  <rect x="732" y="100" width="208" height="12" fill="#16a34a"/>
  <text x="836" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5. Fairness Verified</text>
  <text x="836" y="115" text-anchor="middle" font-size="10" fill="#ffffff">Model Compliant</text>
  <text x="836" y="138" text-anchor="middle" font-size="10" fill="#333">Fair model auto-reloaded</text>
  <text x="836" y="155" text-anchor="middle" font-size="10" fill="#333">Fresh inferences sent</text>
  <text x="836" y="172" text-anchor="middle" font-size="10" fill="#333">Grafana drops green</text>
  <rect x="748" y="186" width="178" height="48" rx="6" fill="#f0fdf4"/>
  <text x="836" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">Fairness Restored ✓</text>
  <text x="836" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">SPD +0.02  DIR 0.95</text>
  <text x="836" y="232" text-anchor="middle" font-size="10" fill="#16a34a">Within all thresholds</text>

  <!-- ── Notebook cell labels below ─────────────────────────── -->
  <text x="99"  y="268" text-anchor="middle" font-size="9" fill="#6a6e73">Cells 4 – 6</text>
  <text x="277" y="268" text-anchor="middle" font-size="9" fill="#6a6e73">Cell 7</text>
  <text x="455" y="268" text-anchor="middle" font-size="9" fill="#6a6e73">Cell 10</text>
  <text x="633" y="268" text-anchor="middle" font-size="9" fill="#6a6e73">Cells 11 – 11b</text>
  <text x="836" y="268" text-anchor="middle" font-size="9" fill="#6a6e73">Cell 12</text>

  <!-- ── Bottom summary bar ─────────────────────────────────── -->
  <rect x="20" y="280" width="920" height="30" rx="6" fill="#151515"/>
  <text x="480" y="300" text-anchor="middle" font-size="11" fill="#ffffff">
    TrustyAI monitors every inference  •  Grafana shows real-time SPD/DIR  •  PrometheusRule fires automatically  •  KFP triggers remediation
  </text>

</svg>
