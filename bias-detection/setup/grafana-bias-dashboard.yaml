apiVersion: v1
kind: ConfigMap
metadata:
  name: trustyai-bias-dashboard
  namespace: openshift-config-managed
  labels:
    console.openshift.io/dashboard: "true"
data:
  trustyai-bias-dashboard.json: |
    {
      "title": "TrustyAI - Bias Monitor (Network Slice)",
      "uid": "trustyai-bias-005",
      "schemaVersion": 38,
      "refresh": "15s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "SPD \u2014 Statistical Parity Difference  |  Fair: |SPD| < 0.10  |  Alert: > \u00b10.15",
          "type": "graph",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "trustyai_spd_live{model=\"network-slice-model\"}",
              "legendFormat": "SPD (Urban \u2212 Rural)"
            }
          ],
          "lines": true,
          "fill": 2,
          "linewidth": 3,
          "nullPointMode": "null",
          "legend": {
            "show": true,
            "current": true,
            "values": true,
            "avg": true,
            "max": true,
            "min": true,
            "alignAsTable": false,
            "rightSide": false
          },
          "yaxes": [
            {
              "format": "short",
              "label": "SPD",
              "show": true,
              "min": -0.5,
              "max": 0.5
            },
            {
              "format": "short",
              "show": false
            }
          ],
          "xaxis": {
            "mode": "time",
            "show": true
          },
          "thresholds": [
            {
              "colorMode": "warning",
              "op": "gt",
              "value": 0.1,
              "fill": true,
              "line": true,
              "yaxis": "left"
            },
            {
              "colorMode": "critical",
              "op": "gt",
              "value": 0.15,
              "fill": true,
              "line": true,
              "yaxis": "left"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "title": "DIR \u2014 Disparate Impact Ratio  |  Fair: 0.80\u20131.20  |  Alert: < 0.80 (4/5ths rule)",
          "type": "graph",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "trustyai_dir_live{model=\"network-slice-model\"}",
              "legendFormat": "DIR ({{step}})"
            }
          ],
          "lines": true,
          "fill": 2,
          "linewidth": 3,
          "nullPointMode": "null",
          "legend": {
            "show": true,
            "current": true,
            "values": true,
            "avg": true,
            "max": true,
            "min": true,
            "alignAsTable": false,
            "rightSide": false
          },
          "yaxes": [
            {
              "format": "short",
              "label": "DIR",
              "show": true,
              "min": 0,
              "max": 2.0
            },
            {
              "format": "short",
              "show": false
            }
          ],
          "xaxis": {
            "mode": "time",
            "show": true
          },
          "thresholds": [
            {
              "colorMode": "critical",
              "op": "lt",
              "value": 0.8,
              "fill": true,
              "line": true,
              "yaxis": "left"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 10
          }
        },
        {
          "id": 3,
          "title": "Inferences Monitored by TrustyAI",
          "type": "graph",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(trustyai_model_observations_total{model=\"network-slice-model\"}) by (model)",
              "legendFormat": "Observations"
            }
          ],
          "lines": true,
          "fill": 2,
          "linewidth": 3,
          "nullPointMode": "null",
          "legend": {
            "show": true,
            "current": true,
            "values": true,
            "avg": true,
            "max": true,
            "min": true,
            "alignAsTable": false,
            "rightSide": false
          },
          "yaxes": [
            {
              "format": "short",
              "label": "Count",
              "show": true,
              "min": 0
            },
            {
              "format": "short",
              "show": false
            }
          ],
          "xaxis": {
            "mode": "time",
            "show": true
          },
          "thresholds": [],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 20
          }
        }
      ]
    }
