# Wave 0 Namespaces — must exist before any operator is installed
# Apply with: oc apply -f shared/operators/wave-0/00-namespaces.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-nfd
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-operator
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-serverless
  labels:
    openshift.io/cluster-monitoring: "true"
---
# openshift-operators is a pre-existing namespace (Service Mesh installs here)
# nvidia-gpu-operator namespace (optional — only if GPU nodes are present)
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu-operator
  labels:
    openshift.io/cluster-monitoring: "true"
