# OpenShift Service Mesh 3 Operator (OSSM 3.x)
# Required as an operator dependency by RHOAI 3.3 during installation,
# even when KServe is configured in RawDeployment mode (no Istio sidecar injection).
# The operator must be present; the mesh itself is not actively used in this demo.
# NOTE: RHOAI 3.3 requires OSSM 3.x — NOT compatible with OSSM 2.x.
# Apply with: oc apply -f shared/operators/wave-0/03-servicemesh-subscription.yaml
---
# Service Mesh 3 installs into the global openshift-operators namespace (all-namespace mode)
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: servicemeshoperator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: servicemeshoperator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
