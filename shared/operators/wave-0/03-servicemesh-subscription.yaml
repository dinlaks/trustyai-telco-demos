# OpenShift Service Mesh 2.x Operator
# RHOAI 2.25 requires OSSM 2.x. The 'stable' channel of servicemeshoperator
# delivers the latest OSSM 2.x release on supported clusters.
# Validated with: RHOAI 2.25 + OSSM 2.x on OpenShift 4.18+
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: servicemeshoperator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: servicemeshoperator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
