# Node Feature Discovery (NFD) Operator
# Discovers and labels nodes with hardware capabilities.
# Required by RHOAI for GPU-aware scheduling and node labeling.
# Apply with: oc apply -f shared/operators/wave-0/01-nfd-subscription.yaml
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: nfd-operator-group
  namespace: openshift-nfd
spec:
  targetNamespaces:
  - openshift-nfd
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: nfd
  namespace: openshift-nfd
spec:
  channel: stable
  installPlanApproval: Automatic
  name: nfd
  source: redhat-operators
  sourceNamespace: openshift-marketplace
