# Authorino Operator (optional in RHOAI 2.x, required in 3.x)
# Provides token-based authentication for KServe model serving endpoints.
# Safe to include — deploy-prereqs.sh skips it if already installed.
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: authorino-operator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: authorino-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
