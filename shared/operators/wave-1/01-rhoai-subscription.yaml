# Red Hat OpenShift AI (RHOAI) Operator
# The parent operator that manages all RHOAI components including
# TrustyAI, KServe, Workbenches, and Data Science Pipelines.
# Must be installed AFTER all Wave 0 operators are healthy.
# Apply with: oc apply -f shared/operators/wave-1/01-rhoai-subscription.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: redhat-ods-operator
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhods-operator-group
  namespace: redhat-ods-operator
# rhods-operator supports AllNamespaces mode only — omit targetNamespaces
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhods-operator
  namespace: redhat-ods-operator
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhods-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
