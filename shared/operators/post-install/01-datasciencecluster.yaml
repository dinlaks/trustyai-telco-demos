# DataScienceCluster CR — RHOAI 3.3
# Enables only the components required for the TrustyAI Telco Bias demo.
# Apply AFTER the rhods-operator pod is Running in redhat-ods-operator.
#
# Components enabled:
#   dashboard           — RHOAI web UI (project/workbench management)
#   workbenches         — JupyterLab notebook environment
#   kserve              — Model serving in RawDeployment mode (no Istio/Knative)
#   trustyai            — Bias/fairness metrics, SPD/DIR computation
#   datasciencepipelines— KFP-based retrain pipeline (notebook Cell 11a)
#
# Components explicitly disabled:
#   modelmeshserving    — Deprecated in RHOAI 3.x; not used in this demo
#   codeflare/ray/kueue — Distributed training stack; not needed
#   trainingoperator    — Fine-tuning operator; not needed
#   modelregistry       — Model registry service; not needed
#
# Apply with: oc apply -f shared/operators/post-install/01-datasciencecluster.yaml
---
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default
  namespace: redhat-ods-operator
spec:
  components:

    # ── Required: RHOAI UI ───────────────────────────────────────────────
    dashboard:
      managementState: Managed

    # ── Required: Notebook workbench (where the demo notebook runs) ──────
    workbenches:
      managementState: Managed

    # ── Required: Model serving (RawDeployment — no Istio/Knative needed) ─
    kserve:
      managementState: Managed
      # serving.managementState: Removed disables Knative Serving entirely.
      # The Serverless operator (Wave 0) satisfies the OLM dependency check
      # but is not actively used for inference in RawDeployment mode.
      serving:
        managementState: Removed
      defaultDeploymentMode: RawDeployment

    # ── Required: TrustyAI bias/fairness observability ───────────────────
    trustyai:
      managementState: Managed

    # ── Optional: Data Science Pipelines (KFP retrain — notebook Cell 11a) ─
    # Cell 11b performs local retrain without KFP. Set to Removed if you
    # want a lighter cluster footprint and will only use Cell 11b.
    datasciencepipelines:
      managementState: Managed

    # ── Disabled: not used by this demo ─────────────────────────────────
    modelmeshserving:
      managementState: Removed

    codeflare:
      managementState: Removed

    ray:
      managementState: Removed

    kueue:
      managementState: Removed

    trainingoperator:
      managementState: Removed

    modelregistry:
      managementState: Removed
