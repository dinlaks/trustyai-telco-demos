# DataScienceCluster CR — RHOAI 2.25
# Enables only the components required for the TrustyAI Telco Bias demo.
# Apply AFTER the rhods-operator pod is Running in redhat-ods-operator.
#
# Validated on: OpenShift 4.18+ + RHOAI 2.25 + OSSM 2.x
---
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default
  namespace: redhat-ods-operator
spec:
  components:

    # ── Required: RHOAI UI ───────────────────────────────────────────────
    dashboard:
      managementState: Managed

    # ── Required: Notebook workbench ────────────────────────────────────
    workbenches:
      managementState: Managed

    # ── Required: Model serving (RawDeployment — no Knative needed) ─────
    kserve:
      managementState: Managed
      serving:
        managementState: Removed
      defaultDeploymentMode: RawDeployment

    # ── Required: TrustyAI bias/fairness observability ───────────────────
    trustyai:
      managementState: Managed

    # ── Optional: Data Science Pipelines (KFP retrain — notebook Cell 12) ─
    datasciencepipelines:
      managementState: Managed

    # ── Disabled: not used by this demo ─────────────────────────────────
    modelmeshserving:
      managementState: Removed

    codeflare:
      managementState: Removed

    ray:
      managementState: Removed

    trainingoperator:
      managementState: Removed
